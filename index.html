<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Huber 3D Druck</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      overflow-x:hidden;
    }

    header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px 10%;
      position:fixed;
      width:100%;
      top:0;
      background:rgba(15,23,42,0.9);
      backdrop-filter:blur(10px);
      z-index:1000;
    }

    .logo-box{
      display:flex;
      align-items:center;
      gap:15px;
    }

    .logo{
      width:60px;
      height:60px;
      border-radius:15px;
      background:linear-gradient(135deg,#38bdf8,#0ea5e9);
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:28px;
      font-weight:bold;
      color:#0f172a;
      box-shadow:0 0 20px rgba(56,189,248,0.4);
    }

    .logo-text{
      font-size:28px;
      font-weight:bold;
      color:white;
    }

    .logo-text span{
      color:#38bdf8;
    }

    nav a{
      color:white;
      text-decoration:none;
      margin-left:25px;
      transition:0.3s;
      font-size:17px;
    }

    nav a:hover{
      color:#38bdf8;
    }

    .hero{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:120px 20px;
</html>
